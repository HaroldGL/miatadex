<style>
  :root {
    --red: #C0002A;
    --red-dark: #8a001e;
    --red-light: #f5e6ea;
    --white: #ffffff;
    --off-white: #f7f5f3;
    --light-gray: #ede9e4;
    --mid-gray: #c8c0b8;
    --text: #1a1210;
    --text-muted: #7a6a62;
    --border: #ddd6cf;
    --na-c: #C0002A;
    --nb-c: #d4500a;
    --nc-c: #1a5fa8;
    --nd-c: #1a8a6e;
    --shadow: 0 2px 16px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--off-white); color: var(--text); font-family: 'Montserrat', sans-serif; min-height: 100dvh; overflow-x: hidden; }

  .nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--white); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,0.07); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; background: none; border: none; cursor: pointer; color: var(--mid-gray); font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; position: relative; }
  .nav-btn::after { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: var(--red); border-radius: 0 0 2px 2px; transform: scaleX(0); transition: transform 0.2s; }
  .nav-btn.active { color: var(--red); }
  .nav-btn.active::after { transform: scaleX(1); }
  .nav-btn svg { width: 20px; height: 20px; }

  .page { display: none; padding-bottom: 80px; min-height: 100dvh; }
  .page.active { display: block; }

  .header { background: var(--white); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 50; overflow: hidden; }
  .header-bar { background: var(--red); height: 4px; }
  .header-content { padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: baseline; gap: 8px; }
  .logo-main { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; color: var(--red); letter-spacing: 0.05em; }
  .logo-sub { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; }
  .today-pill { display: flex; align-items: center; gap: 6px; background: var(--red); border-radius: 100px; padding: 6px 14px; }
  .today-num { font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700; color: white; line-height: 1; }
  .today-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.75); text-transform: uppercase; line-height: 1.2; }

  .add-container { padding: 16px; }
  .section-label { font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* GEN CARDS WITH IMAGES */
  .gen-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .gen-card { background: var(--white); border: 2px solid var(--border); border-radius: 14px; padding: 0; cursor: pointer; transition: all 0.18s cubic-bezier(0.34,1.4,0.64,1); display: flex; flex-direction: column; align-items: center; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .gen-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--c, var(--red)); opacity: 0; transition: opacity 0.18s; z-index: 2; }
  .gen-card.selected { border-color: var(--c, var(--red)); background: color-mix(in srgb, var(--c, var(--red)) 6%, white); transform: translateY(-3px); box-shadow: 0 8px 24px color-mix(in srgb, var(--c, var(--red)) 28%, transparent); }
  .gen-card.selected::before { opacity: 1; }
  .gen-card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; object-position: center; display: block; border-radius: 10px 10px 0 0; }
  .gen-card-footer { width: 100%; padding: 8px 10px 10px; display: flex; align-items: baseline; justify-content: space-between; }
  .gen-badge { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: 0.04em; }
  .gen-years { font-size: 9px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; }

  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 9px 18px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--white); color: var(--text-muted); font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .chip.selected { border-color: var(--red); background: var(--red); color: white; box-shadow: 0 3px 12px rgba(192,0,42,0.3); }

  .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .color-swatch { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.15s; }
  .color-swatch:active { transform: scale(0.92); }
  .swatch-dot { width: 44px; height: 44px; border-radius: 50%; border: 3px solid transparent; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: relative; }
  .color-swatch.selected .swatch-dot { border-color: var(--red); transform: scale(1.14); box-shadow: 0 4px 16px rgba(192,0,42,0.35); }
  .color-swatch.selected .swatch-dot::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: 900; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
  .swatch-label { font-size: 9px; font-weight: 700; letter-spacing: 0.03em; color: var(--text-muted); text-align: center; text-transform: uppercase; line-height: 1.2; }

  .note-input { width: 100%; background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .note-input:focus { border-color: var(--red); }
  .note-input::placeholder { color: var(--mid-gray); }

  .add-btn { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--red); color: white; font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 500; letter-spacing: 0.12em; cursor: pointer; margin-top: 24px; transition: transform 0.1s, box-shadow 0.2s, background 0.2s; box-shadow: 0 4px 20px rgba(192,0,42,0.4); position: relative; overflow: hidden; }
  .add-btn:active { transform: scale(0.97); background: var(--red-dark); }
  .add-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%); pointer-events: none; }

  @keyframes ripple { to { transform: scale(5); opacity: 0; } }
  .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.35); width: 40px; height: 40px; margin: -20px; animation: ripple 0.5s linear; pointer-events: none; }
  @keyframes countPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
  .pop { animation: countPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

  .history-container { padding: 16px; }
  .day-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin: 16px 0 8px; display: flex; align-items: center; gap: 8px; }
  .day-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .entry-card { background: var(--white); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); border-left: 4px solid var(--gen-c, var(--red)); animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .entry-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .entry-gen { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--gen-c, var(--red)); min-width: 34px; text-align: center; line-height: 1; }
  .entry-details { flex: 1; min-width: 0; }
  .entry-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: var(--light-gray); color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
  .entry-note { font-size: 12px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-time { font-size: 10px; font-weight: 600; color: var(--mid-gray); margin-top: 3px; }
  .entry-del { background: none; border: none; color: var(--mid-gray); cursor: pointer; padding: 8px; border-radius: 8px; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
  .entry-del:hover { color: var(--red); background: var(--red-light); }

  .stats-container { padding: 16px; }
  .big-stat { background: var(--red); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 12px; box-shadow: 0 6px 24px rgba(192,0,42,0.35); position: relative; overflow: hidden; }
  .big-stat::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .big-num { font-family: 'Oswald', sans-serif; font-size: 80px; font-weight: 700; color: white; line-height: 1; position: relative; z-index: 1; }
  .big-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-top: 4px; position: relative; z-index: 1; }
  .stat-sub { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 100px; padding: 4px 14px; font-size: 11px; font-weight: 700; color: white; letter-spacing: 0.1em; margin-top: 10px; position: relative; z-index: 1; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--white); border-radius: 12px; padding: 16px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid var(--border); }
  .stat-card.accent { border-top-color: var(--red); }
  .stat-n { font-family: 'Oswald', sans-serif; font-size: 38px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-l { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
  .chart-card { background: var(--white); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .chart-title { font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .chart-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Gen bar with image */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bar-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .bar-right { flex: 1; }
  .bar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .bar-lbl { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; }
  .bar-track { flex: 1; background: var(--light-gray); border-radius: 6px; height: 18px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.7s cubic-bezier(0.34,1.2,0.64,1); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
  .bar-val { font-size: 11px; font-weight: 700; color: white; }

  .color-list { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  .color-row { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; }
  .color-dot-sm { width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.2); flex-shrink: 0; }
  .color-count { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--red); margin-left: auto; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 52px; margin-bottom: 16px; }
  .empty-txt { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; line-height: 1.6; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 18px; padding: 28px 24px; max-width: 320px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-t { font-family: 'Oswald', sans-serif; font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .modal-txt { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; font-weight: 500; }
  .modal-btns { display: flex; gap: 10px; }
  .m-cancel, .m-confirm { flex: 1; padding: 13px; border-radius: 10px; border: none; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; }
  .m-cancel { background: var(--light-gray); color: var(--text-muted); }
  .m-confirm { background: var(--red); color: white; }
  .reset-btn { font-size: 11px; font-weight: 700; color: var(--text-muted); background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s; }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>

};
const GEN_HEX = { NA: '#C0002A', NB: '#d4500a', NC: '#1a5fa8', ND: '#1a8a6e' };

const COLORS = [
  { name: 'Soul Red',    hex: '#A40018' },
  { name: 'Blanc',       hex: '#F2EFE8', outline: true },
  { name: 'Noir',        hex: '#1C1C1C' },
  { name: 'Argent',      hex: '#B8B4AC' },
  { name: 'Bleu Marine', hex: '#1B3A6B' },
  { name: 'Bleu Ciel',   hex: '#5B9DC9' },
  { name: 'Gris',        hex: '#70757A' },
  { name: 'Vert',        hex: '#2D6A4F' },
  { name: 'Rouge',       hex: '#CC2200' },
  { name: 'Beige/Tan',   hex: '#C4A882', outline: true },
  { name: 'Jaune',       hex: '#E8C84A', outline: true },
  { name: 'Autres',      hex: null, other: true },
];

let selection = { gen: null, roof: null, color: null, colorHex: null };
let spots = JSON.parse(localStorage.getItem('miatadex_spots') || '[]');

function init() {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = COLORS.map(c => {
    const bg = c.other ? 'background: repeating-linear-gradient(45deg,#D8D4CE,#D8D4CE 4px,#c0bcb6 4px,#c0bcb6 8px)' : `background:${c.hex}`;
    const outline = (c.outline || c.other) ? 'outline:1.5px solid #ccc8c0;outline-offset:-2px;' : '';
    return `<div class="color-swatch" data-field="color" data-val="${c.name}" data-hex="${c.hex||'#aaa'}" onclick="selectColor(this)">
      <div class="swatch-dot" style="${bg};${outline}"></div>
      <div class="swatch-label">${c.name}</div>
    </div>`;
  }).join('');
  updateTodayCount();
}

function selectOption(el) {
  const f = el.dataset.field, v = el.dataset.val;
  if (selection[f] === v) { selection[f] = null; el.classList.remove('selected'); return; }
  document.querySelectorAll(`[data-field="${f}"]`).forEach(e => e.classList.remove('selected'));
  selection[f] = v; el.classList.add('selected');
}

function selectColor(el) {
  const v = el.dataset.val;
  if (selection.color === v) { selection.color = null; selection.colorHex = null; el.classList.remove('selected'); return; }
  document.querySelectorAll('[data-field="color"]').forEach(e => e.classList.remove('selected'));
  selection.color = v; selection.colorHex = el.dataset.hex; el.classList.add('selected');
}

function addSpot(e) {
  if (!selection.gen) {
    const btn = e.currentTarget;
    btn.style.background = '#8a001e';
    btn.textContent = '⚠  Sélectionnez la génération !';
    setTimeout(() => { btn.style.background = ''; btn.textContent = 'Enregistrer cette MX-5'; }, 1800);
    return;
  }
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className = 'ripple';
  rip.style.left = (e.clientX - rect.left) + 'px';
  rip.style.top = (e.clientY - rect.top) + 'px';
  btn.appendChild(rip);
  setTimeout(() => rip.remove(), 600);
  spots.unshift({ id: Date.now(), gen: selection.gen, roof: selection.roof, color: selection.color, colorHex: selection.colorHex, note: document.getElementById('note-input').value.trim(), ts: new Date().toISOString() });
  save(); updateTodayCount();
  selection = { gen: null, roof: null, color: null, colorHex: null };
  document.querySelectorAll('.gen-card, .chip, .color-swatch').forEach(e => e.classList.remove('selected'));
  document.getElementById('note-input').value = '';
}

function updateTodayCount() {
  const today = new Date().toDateString();
  const n = spots.filter(s => new Date(s.ts).toDateString() === today).length;
  const el = document.getElementById('today-count');
  el.textContent = n; el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function renderHistory() {
  const c = document.getElementById('history-list');
  if (!spots.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">🚗</div><div class="empty-txt">Aucun spot enregistré.<br>Ajoutez votre première MX-5 !</div></div>'; return; }
  let html = '', lastDay = '';
  spots.forEach(s => {
    const d = new Date(s.ts), dayKey = d.toDateString();
    const dayStr = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    if (dayKey !== lastDay) {
      const cnt = spots.filter(x => new Date(x.ts).toDateString() === dayKey).length;
      html += `<div class="day-label">${dayStr} · ${cnt} spot${cnt>1?'s':''}</div>`;
      lastDay = dayKey;
    }
    const time = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const gHex = GEN_HEX[s.gen] || '#C0002A';
    const img = GEN_IMGS[s.gen] || '';
    const tags = [
      s.roof ? `<span class="tag">${s.roof}</span>` : '',
      s.color ? `<span class="tag"><span style="width:10px;height:10px;border-radius:50%;background:${s.colorHex||'#aaa'};box-shadow:0 1px 3px rgba(0,0,0,.2);flex-shrink:0;display:inline-block"></span>${s.color}</span>` : '',
    ].filter(Boolean).join('');
    html += `<div class="entry-card" style="--gen-c:${gHex}">
      <img class="entry-thumb" src="${img}" alt="${s.gen}">
      <div class="entry-details">
        <div class="entry-tags">${tags || '<span class="tag">—</span>'}</div>
        ${s.note ? `<div class="entry-note">${s.note}</div>` : ''}
        <div class="entry-time">${time}</div>
      </div>
      <button class="entry-del" onclick="deleteSpot(${s.id})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  });
  c.innerHTML = html;
}

function deleteSpot(id) { spots = spots.filter(s => s.id !== id); save(); updateTodayCount(); renderHistory(); }

function renderStats() {
  const c = document.getElementById('stats-content');
  if (!spots.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">Aucune stat disponible.<br>Commencez à spotter !</div></div>'; return; }
  const total = spots.length;
  const today = new Date().toDateString();
  const todayN = spots.filter(s => new Date(s.ts).toDateString() === today).length;
  const byDay = {};
  spots.forEach(s => { const d = new Date(s.ts).toDateString(); byDay[d] = (byDay[d]||0)+1; });
  const bestDay = Math.max(...Object.values(byDay));
  const activeDays = Object.keys(byDay).length;
  const genCounts = { NA:0, NB:0, NC:0, ND:0 };
  spots.forEach(s => { if (s.gen in genCounts) genCounts[s.gen]++; });
  const maxGen = Math.max(...Object.values(genCounts), 1);
  const colorCounts = {};
  spots.filter(s => s.color).forEach(s => { if (!colorCounts[s.color]) colorCounts[s.color] = { count:0, hex:s.colorHex }; colorCounts[s.color].count++; });
  const topColors = Object.entries(colorCounts).sort((a,b) => b[1].count - a[1].count).slice(0,8);
  const roofS = spots.filter(s => s.roof==='Soft top').length;
  const roofH = spots.filter(s => s.roof==='Hard top').length;
  const roofTotal = roofS + roofH;

  const genRows = [['NA','#C0002A'],['NB','#d4500a'],['NC','#1a5fa8'],['ND','#1a8a6e']].map(([g,col]) => {
    const w = Math.round(genCounts[g]/maxGen*100);
    return `<div class="bar-row">
      <img class="bar-thumb" src="${GEN_IMGS[g]}" alt="${g}">
      <div class="bar-right">
        <div class="bar-top">
          <span class="bar-lbl" style="color:${col}">${g}</span>
          <span style="font-size:11px;font-weight:700;color:${col}">${genCounts[g]}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${col}"></div></div>
      </div>
    </div>`;
  }).join('');

  const colorRows = topColors.map(([name, d]) => `<div class="color-row"><div class="color-dot-sm" style="background:${d.hex||'#aaa'}"></div><span>${name}</span><span class="color-count">${d.count}</span></div>`).join('');

  c.innerHTML = `
    <div class="big-stat">
      <div class="big-num">${total}</div>
      <div class="big-lbl">MX-5 spotées au total</div>
      <span class="stat-sub">🏆 Record : ${bestDay} en une journée</span>
    </div>
    <div class="stats-grid">
      <div class="stat-card accent"><div class="stat-n">${todayN}</div><div class="stat-l">Aujourd'hui</div></div>
      <div class="stat-card"><div class="stat-n">${activeDays}</div><div class="stat-l">Jours actifs</div></div>
      <div class="stat-card"><div class="stat-n">${(total/activeDays).toFixed(1)}</div><div class="stat-l">Moy / jour</div></div>
      <div class="stat-card"><div class="stat-n">${roofTotal>0?Math.round(roofS/roofTotal*100)+'%':'—'}</div><div class="stat-l">Soft top</div></div>
    </div>
    <div class="chart-card"><div class="chart-title">Par génération</div>${genRows}</div>
    ${topColors.length ? `<div class="chart-card"><div class="chart-title">Couleurs vues</div><div class="color-list">${colorRows}</div></div>` : ''}
  `;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  if (id==='history') renderHistory();
  if (id==='stats') renderStats();
}
function confirmReset() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function doReset() { spots=[]; save(); updateTodayCount(); renderHistory(); closeModal(); }
function save() { localStorage.setItem('miatadex_spots', JSON.stringify(spots)); }
init();
</script>
</body>
</html>
